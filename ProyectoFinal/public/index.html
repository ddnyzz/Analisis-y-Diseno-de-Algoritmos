<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoRutas Zacatecas - Algoritmos</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <header class="top-bar">
        <h1>GeoRutas</h1>
        
        <div class="control-group">
            <label>Origen: <select id="originSelect"></select></label>
            <label>Destino: <select id="destinationSelect"></select></label>
            <button id="btnClearSelection">Limpiar</button>
        </div>

        <div class="divider"></div>

        <div class="chip-group">
            <button class="chip active" data-algorithm="dijkstra">Dijkstra</button>
            <button class="chip" data-algorithm="prim">Prim</button>
            <button class="chip" data-algorithm="kruskal">Kruskal</button>
        </div>

        <div class="divider"></div>

        <button id="btnRunAlgorithm" class="run-btn">▶ Calcular Ruta</button>
    </header>

    <div id="map"></div>

    <div class="toast" id="toast"></div>

    <div style="display: none;" aria-hidden="true">
        <button id="btnFitMap"></button>
        <button id="btnOpenControl"></button>
        <button id="btnCloseControl"></button>
        <div id="metricNodes"></div>
        <div id="metricEdges"></div>
        <select id="weightSelect"><option value="distance"></option></select>
        <input type="checkbox" id="toggleWeights" checked>
        <input type="checkbox" id="toggleGraph" checked>
        <input type="file" id="graphFile">
        <div id="currentInstruction"></div>
        <div id="algorithmStatus"></div>
        <div id="floatingResult"></div>
        <div id="resultTitle"></div>
        <button id="btnDownloadResult"></button>
        <div id="resultMessage"></div>
        <div id="statCost"></div>
        <div id="statVisited"></div>
        <div id="statTime"></div>
        <div id="algorithmExplanation"></div>
        <button id="btnRefreshHistory"></button>
        <div id="historyList"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
